<!DOCTYPE html>
    <html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Lista de Divisas | Cotizaciones Hoy</title>
        <meta name="description" content="Explora la lista completa de divisas con información detallada, precios actualizados y herramientas de búsqueda y ordenamiento.">
        <meta name="keywords" content="divisas, lista, tipos de cambio, monedas, precios, búsqueda, ordenamiento, símbolos, cotizaciones">
        <meta name="author" content="Cotizaciones Hoy">
        <meta name="robots" content="index, follow">
        <link rel="canonical" href="URL_CANONICA_DE_LA_PAGINA">
        <link rel="stylesheet" href="style.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    </head>
    <body>

        <header class="site-header">
            <div class="container">
                <a href="index.html" class="logo-link">
                    <img src="images/logo.png" alt="Logo Cotizaciones Hoy" class="logo">
                </a>
                <nav class="site-nav">
                    <a href="index.html" class="nav-link">Inicio</a>
                    <a href="contacto.html" class="nav-link">Contacto</a>
                </nav>
            </div>
        </header>

        <main class="main-content">
            <section class="currency-list-section">
                <div class="section-header">
                    <h1 class="section-title">Lista de Divisas</h1>
                    <p class="section-description">Explora la lista completa de divisas con información detallada y precios actualizados.</p>
                </div>

                <div class="search-container">
                    <label for="busqueda-divisa" class="search-label">Buscar divisa:</label>
                    <input type="text" id="busqueda-divisa" class="search-input" placeholder="Código, nombre o símbolo">
                    <div id="mensaje-error" class="error-message"></div>
                </div>

                <div id="all-currencies" class="all-currencies">
                    <table id="tabla-divisas" class="currency-table">
                        <thead>
                            <tr>
                                <th class="codigo-columna">Código</th>
                                <th class="nombre-columna ordenable" data-orden="asc">Nombre</th>
                                <th class="simbolo-columna">Símbolo</th>
                                <th class="precio-columna ordenable" data-orden="asc">Precio (USD)</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td colspan="4">Cargando datos...</td>
                            </tr>
                        </tbody>
                    </table>
                    <div id="indicador-carga" class="loading-indicator">Cargando...</div>
                </div>

                <div class="pagination-container">
                    <button id="pagina-anterior" class="pagination-button">Anterior</button>
                    <span id="pagina-actual" class="pagination-info">1</span>
                    <button id="pagina-siguiente" class="pagination-button">Siguiente</button>
                </div>
            </section>
        </main>

        <footer class="site-footer">
            <div class="container">
                <p class="footer-text">&copy; 2024 Cotizaciones Hoy. Todos los derechos reservados.</p>
                <p class="footer-text">Contacto: info@cotizacioneshoy.com</p>
            </div>
        </footer>

        <script src="divisas.js"></script>
    </body>
    </html>
