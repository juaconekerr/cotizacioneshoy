<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de usuario</title>
    <meta name="description" content="Regístrate para crear una cuenta en nuestro sitio.">
    <meta name="keywords" content="registro, cuenta, usuario, crear cuenta">
    <meta name="author" content="Tu Nombre o Nombre de la Empresa">
    <link rel="canonical" href="URL de tu página de registro">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <meta property="og:title" content="Registro de usuario">
    <meta property="og:description" content="Regístrate para crear una cuenta en nuestro sitio.">
    <meta property="og:image" content="URL de una imagen representativa">
    <meta property="og:url" content="URL de tu página de registro">
    <meta property="og:type" content="website">
    <meta name="robots" content="index, follow">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
</head>
<body>
    <header>
        <nav>
            <ul>
                <li><a href="index.html">Inicio</a></li>
                <li><a href="login.html">Iniciar sesión</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="registro-container">
            <h1 class="animate__animated animate__fadeInDown">Registro de usuario</h1>
            <form id="registro-form">
                <div class="form-group animate__animated animate__fadeInUp">
                    <label for="nombre_completo">Nombre completo:</label>
                    <input type="text" id="nombre_completo" name="nombre_completo" placeholder="Ingresa tu nombre completo" required>
                </div>
                <div class="form-group animate__animated animate__fadeInUp">
                    <label for="email">Correo electrónico:</label>
                    <input type="email" id="email" name="email" placeholder="Ingresa tu correo electrónico" required>
                </div>
                <div class="form-group animate__animated animate__fadeInUp">
                    <label for="password">Contraseña:</label>
                    <input type="password" id="password" name="password" placeholder="Ingresa tu contraseña" required>
                </div>
                <div class="form-group animate__animated animate__fadeInUp">
                    <label for="confirm_password">Confirmar contraseña:</label>
                    <input type="password" id="confirm_password" name="confirm_password" placeholder="Confirma tu contraseña" required>
                </div>
                <div class="form-group animate__animated animate__fadeInUp">
                    <button type="submit">Registrarse</button>
                </div>
                <div id="mensaje-error" class="error-message"></div>
                <div id="mensaje-exito" class="success-message animate__animated animate__fadeInUp"></div>
                <div id="mensaje-password" class="error-message animate__animated animate__fadeInUp"></div>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2024 Tu Sitio. Todos los derechos reservados.</p>
    </footer>

    <script type="module">
        // Import the functions you need from the SDKs you need
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.5.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/11.5.0/firebase-auth.js";

        // Your web app's Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyChpFnp833eYISgcOBCmrmqb0a2iLy82WU",
            authDomain: "cotizaciones-hoy.firebaseapp.com",
            projectId: "cotizaciones-hoy",
            storageBucket: "cotizaciones-hoy.firebasestorage.app",
            messagingSenderId: "104412367418",
            appId: "1:104412367418:web:0962a9c13738e088610303",
            measurementId: "G-R5KRC3LZ70"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // Obtén el formulario y los elementos de mensaje
        const registroForm = document.getElementById('registro-form');
        const mensajeError = document.getElementById('mensaje-error');
        const mensajeExito = document.getElementById('mensaje-exito');
        const mensajePassword = document.getElementById('mensaje-password');
        const passwordInput = document.getElementById('password');
        const confirmPasswordInput = document.getElementById('confirm_password');

        // Función para mostrar mensajes de error
        function showError(message, element) {
            element.textContent = message;
            element.style.display = 'block';
        }

        // Función para verificar si las contraseñas coinciden en tiempo real
        function checkPasswordsMatch() {
            const password = passwordInput.value;
            const confirmPassword = confirmPasswordInput.value;

            if (password !== confirmPassword) {
                showError('Las contraseñas no coinciden.', mensajePassword);
            } else {
                mensajePassword.style.display = 'none';
            }
        }

        // Escucha los eventos de input para verificar si las contraseñas coinciden
        passwordInput.addEventListener('input', checkPasswordsMatch);
        confirmPasswordInput.addEventListener('input', checkPasswordsMatch);

        // Escucha el evento submit del formulario
        registroForm.addEventListener('submit', (event) => {
            event.preventDefault(); // Evita que se recargue la página

            // Obtén los valores del formulario
            const email = document.getElementById('email').value;
            const password = passwordInput.value;
            const confirmPassword = confirmPasswordInput.value;

            // Verifica si las contraseñas coinciden
            if (password !== confirmPassword) {
                showError('Las contraseñas no coinciden.', mensajePassword);
                return; // Detiene el registro si las contraseñas no coinciden
            }

            // Crea el usuario con correo electrónico y contraseña
            createUserWithEmailAndPassword(auth, email, password)
                .then((userCredential) => {
                    // Registro exitoso
                    const user = userCredential.user;
                    console.log('Usuario registrado:', user);
                    mensajeExito.textContent = 'Registro exitoso. ¡Bienvenido!';
                    mensajeExito.classList.add('animate__animated', 'animate__fadeIn');
                    
                    // Redirige al usuario a la página de búsqueda de divisas
                    setTimeout(() => {
                        window.location.href = 'buscador.html'; // Redirige a buscador.html
                    }, 4000); // Redirige después de 4 segundos
                })
                .catch((error) => {
                    // Maneja los errores
                    const errorCode = error.code;
                    const errorMessage = error.message;
                    console.error('Error al registrar usuario:', errorCode, errorMessage);
                    showError(errorMessage, mensajeError);
                });
        });
    </script>
</body>
</html>
